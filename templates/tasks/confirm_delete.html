{% extends "_base.html" %}

{% block content %}
<div class="container" style="max-width: 520px; margin: 3rem auto;">
    <div class="card" style="padding: 2rem;">
        <h2 style="margin-bottom: 0.5rem;">Delete Task</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">
            Are you sure you want to delete <strong>{{ task.title }}</strong>?
            This action cannot be undone and will remove all associated submissions.
        </p>
        <form method="post" style="display: flex; gap: 1rem;">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'view_task' task_id=task.id %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
