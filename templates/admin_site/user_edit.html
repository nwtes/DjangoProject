{% extends 'admin_site/_admin_base.html' %}
{% block nav_users %}active{% endblock %}

{% block content %}
<header class="page-header">
    <h1>Edit User: {{ target_user.username }}</h1>
    <a class="btn btn-ghost" href="{% url 'admin_users' %}">← Back</a>
</header>

<div class="admin-form-card">
    <form method="POST">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" value="{{ target_user.username }}" class="form-input">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ target_user.email }}" class="form-input">
            </div>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" name="display_name" value="{{ profile.display_name|default:'' }}" class="form-input">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-input">
                    <option value="student" {% if profile.role == 'student' %}selected{% endif %}>Student</option>
                    <option value="teacher" {% if profile.role == 'teacher' %}selected{% endif %}>Teacher</option>
                </select>
            </div>
            <div class="form-group form-group-checkbox">
                <label>
                    <input type="checkbox" name="is_active" {% if target_user.is_active %}checked{% endif %}>
                    Active account
                </label>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a class="btn btn-ghost" href="{% url 'admin_users' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
